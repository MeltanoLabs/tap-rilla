version: 1
default_environment: dev
project_id: tap-rilla-test

environments:
- name: dev

plugins:
  extractors:
  - name: tap-rilla
    namespace: tap_rilla
    pip_url: -e .
    executable: tap-rilla
    capabilities:
    - catalog
    - discover
    - schema-flattening
    - state
    - stream-maps
    - structured-logging
    settings:
    - name: api_key
      kind: password
      label: API Key
      description: The API key to authenticate with the Rilla API
      sensitive: true
    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: The earliest datetime from which to pull data (ISO 8601 format)
    - name: end_date
      kind: date_iso8601
      label: End Date
      description: The latest datetime from which to pull data (ISO 8601 format)
    - name: users
      kind: array
      label: Users
      description: Optional array of user email addresses to filter conversations. Only applies to conversations stream.
    - name: date_type
      kind: options
      label: Date Type
      description: Date type to filter by - timeOfRecording or processedDate. Defaults to timeOfRecording.
      options:
      - label: Time of Recording
        value: timeOfRecording
      - label: Processed Date
        value: processedDate
    config:
      start_date: '2024-01-01'

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-duckdb
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-duckdb.git
