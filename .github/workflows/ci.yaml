name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "tap_rilla/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yaml"
  push:
    branches:
      - main
      - v*
    paths:
      - "tap_rilla/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yaml"
  merge_group:
  workflow_dispatch:
    inputs: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  FORCE_COLOR: "1"

jobs:
  types:
    name: Check types
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: |
          uv sync --only-group=typing
          uv run mypy tap_rilla tests
          uv run ty check tap_rilla tests
